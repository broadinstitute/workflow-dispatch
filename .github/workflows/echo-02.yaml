name: Message Echo 2
run-name: ${{ inputs.run-name }}
on: 
  workflow_dispatch:
    inputs:
      message:
        description: "Message to echo"
        required: false
        default: "this is echo 2"
      run-name:
        description: 'Run Name of workflow dispatch'
        required: false
        default: ''

jobs:
  echo:
    runs-on: ubuntu-latest
    steps:
      - name: Echo message
        run: echo '${{ github.event.inputs.message }}'